<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matchmaking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            color: #222;
        }
        h1 { font-size: 20px; }
        h2 { font-size: 16px; margin-top: 0; }
        form { margin-bottom: 20px; }
        input { padding: 4px; margin-right: 5px; }
        button { padding: 4px 10px; cursor: pointer; }
        .columns { display: flex; gap: 20px; }
        .columns > div { flex: 1; }
        table { border-collapse: collapse; width: 100%; margin-top: 5px; }
        th, td { border: 1px solid #ccc; padding: 5px 8px; text-align: left; }
        th { background: #f0f0f0; }
        .note { color: #777; font-size: 13px; }
        #msg { margin-left: 8px; font-size: 13px; }
        @media (max-width: 600px) { .columns { flex-direction: column; } }
    </style>
</head>
<body>
    <h1>Matchmaking</h1>
    <p class="note">Canlı güncelleme (SignalR) — <span id="conn">bağlanıyor...</span></p>
    <p><label><input type="checkbox" id="simToggle" /> Ranked simülatör (otomatik maçlar)</label></p>

    <form id="addForm">
        <input id="userId" placeholder="Kullanıcı ID" required />
        <input id="score" type="number" min="0" placeholder="Skor" required />
        <button type="submit">Ekle</button>
        <button type="button" id="randomBtn">Rastgele</button>
        <span id="msg"></span>
    </form>

    <div class="columns">
        <div>
            <h2>Leaderboard (Eşleşenler) — <span id="lbCount">0</span></h2>
            <table>
                <thead><tr><th>#</th><th>Kullanıcı</th><th>Skor</th><th>Durum</th><th></th></tr></thead>
                <tbody id="lbBody"></tbody>
            </table>
        </div>
        <div>
            <h2>Bekleyen Kuyruk — <span id="wCount">0</span></h2>
            <table>
                <thead><tr><th>Kullanıcı</th><th>Skor</th><th>Bekleme</th></tr></thead>
                <tbody id="wBody"></tbody>
            </table>
        </div>
    </div>

    <h2 style="margin-top:25px">Son Maçlar — <span id="hCount">0</span></h2>
    <table>
        <thead><tr><th>Kazanan</th><th>Kaybeden</th><th>Yeni Skorlar</th><th>Zaman</th></tr></thead>
        <tbody id="hBody"></tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        let waitingData = [];   // bekleyenleri yerelde tut, saniye sayacini fetch'siz guncelleyebilelim

        async function addPlayer(userId, score) {
            const res = await fetch('/api/matchmaking/queue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, score: Number(score) })
            });
            if (res.ok) {
                $('msg').textContent = userId + ' eklendi';
                refresh();
            } else {
                const err = await res.json().catch(() => ({}));
                $('msg').textContent = err.message || 'Hata';
            }
        }

        $('addForm').addEventListener('submit', e => {
            e.preventDefault();
            addPlayer($('userId').value.trim(), $('score').value);
            $('userId').value = '';
            $('score').value = '';
            $('userId').focus();
        });

        $('randomBtn').addEventListener('click', () => {
            const id = 'oyuncu-' + Math.floor(Math.random() * 10000);
            const score = 1000 + Math.floor(Math.random() * 1000);
            addPlayer(id, score);
        });

        function renderRows(body, rows, fn) {
            body.innerHTML = rows.map(fn).join('');
        }

        async function deletePlayer(userId) {
            await fetch('/api/matchmaking/player/' + encodeURIComponent(userId), { method: 'DELETE' });
            $('msg').textContent = userId + ' silindi';
            refresh();
        }

        async function toggleOnline(userId, online) {
            await fetch('/api/matchmaking/player/' + encodeURIComponent(userId) + '/online', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: online })
            });
            refresh();
        }

        async function loadSimulator() {
            try {
                const s = await fetch('/api/matchmaking/simulator').then(r => r.json());
                $('simToggle').checked = s.enabled;
            } catch (e) { }
        }

        $('simToggle').addEventListener('change', async e => {
            await fetch('/api/matchmaking/simulator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: e.target.checked })
            });
            $('msg').textContent = 'Simülatör ' + (e.target.checked ? 'açık' : 'kapalı');
        });

        // Bekleyenleri (yereldeki veriden) saniye sayaci guncel olacak sekilde ciz
        function renderWaiting() {
            $('wCount').textContent = waitingData.length;
            renderRows($('wBody'), waitingData, r => {
                const wait = r.joinedAtUtc
                    ? Math.floor((Date.now() - new Date(r.joinedAtUtc)) / 1000) + ' sn'
                    : '-';
                return `<tr><td>${r.userId}</td><td>${r.score}</td><td>${wait}</td></tr>`;
            });
        }

        async function refresh() {
            try {
                const [lb, w, h] = await Promise.all([
                    fetch('/api/matchmaking/leaderboard').then(r => r.json()),
                    fetch('/api/matchmaking/waiting').then(r => r.json()),
                    fetch('/api/matchmaking/history').then(r => r.json())
                ]);
                $('lbCount').textContent = lb.length;
                renderRows($('lbBody'), lb,
                    (r, i) => `<tr><td>${i + 1}</td><td>${r.userId}</td><td>${r.score}</td>` +
                              `<td>${r.online ? 'online' : 'offline'}</td>` +
                              `<td><button onclick="toggleOnline('${r.userId}', ${!r.online})">${r.online ? 'Offline yap' : 'Online yap'}</button> ` +
                              `<button onclick="deletePlayer('${r.userId}')">Sil</button></td></tr>`);
                waitingData = w;
                renderWaiting();

                $('hCount').textContent = h.length;
                renderRows($('hBody'), h, m => {
                    const t = new Date(m.completedAtUtc).toLocaleTimeString();
                    return `<tr><td>${m.winnerId}</td><td>${m.loserId}</td><td>${m.winnerScore} / ${m.loserScore}</td><td>${t}</td></tr>`;
                });
            } catch (e) {
                // API gecici ulasilamazsa sessizce gec
            }
        }

        // Push gelince fetch'leri topla (debounce) - 1000 eslesme bir anda olsa bile
        // saniyede en fazla bir kez veri cekeriz.
        let refreshTimer = null;
        function scheduleRefresh() {
            if (refreshTimer) return;
            refreshTimer = setTimeout(() => { refreshTimer = null; refresh(); }, 500);
        }

        // --- SignalR baglantisi ---
        const connection = new signalR.HubConnectionBuilder()
            .withUrl('/hub/matchmaking')
            .withAutomaticReconnect()
            .build();

        connection.on('matchCompleted', scheduleRefresh);
        connection.onreconnected(() => { $('conn').textContent = 'bağlı'; refresh(); });
        connection.onreconnecting(() => { $('conn').textContent = 'yeniden bağlanıyor...'; });
        connection.onclose(() => { $('conn').textContent = 'bağlantı kapandı'; });

        connection.start()
            .then(() => { $('conn').textContent = 'bağlı'; })
            .catch(() => { $('conn').textContent = 'bağlanamadı (yine de çalışır)'; });

        // Ilk yukleme
        loadSimulator();
        refresh();

        // Saniye sayacini her saniye fetch'siz guncelle
        setInterval(renderWaiting, 1000);

        // Yedek (fallback): push kacirilirsa / yeni katilimlar icin seyrek poll
        setInterval(refresh, 10000);
    </script>
</body>
</html>
