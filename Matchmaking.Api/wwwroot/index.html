<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matchmaking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            color: #222;
        }

        h1 {
            font-size: 20px;
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
        }

        input {
            padding: 4px;
            margin-right: 5px;
        }

        button {
            padding: 4px 10px;
            cursor: pointer;
        }

        .columns {
            display: flex;
            gap: 20px;
        }

            .columns > div {
                flex: 1;
            }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 5px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 5px 8px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .note {
            color: #777;
            font-size: 13px;
        }

        #msg, #seedMsg {
            margin-left: 8px;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .columns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>Matchmaking</h1>
    <p class="note">Canlı güncelleme (SignalR) — <span id="conn">bağlanıyor...</span></p>
    <p><label><input type="checkbox" id="simToggle" /> Ranked simülatör (otomatik maçlar)</label></p>

    <div id="authPanel">
        <input id="username" placeholder="Kullanıcı adı" />
        <input id="password" type="password" placeholder="Parola" />
        <button id="loginBtn">Giriş</button>
        <button id="registerBtn">Kayıt Ol</button>
        <span id="msg"></span>
    </div>
    <div id="userPanel" style="display:none">
        Giriş: <b id="who"></b>
        <button id="joinBtn">Kuyruğa Katıl</button>
        <button id="logoutBtn">Çıkış</button>
        <span id="msg2"></span>
    </div>

    <div style="margin:10px 0; color:#555; font-size:13px">
        <b>Hızlı ekle (bot):</b>
        <input id="botId" placeholder="bot adı (boş=rastgele)" />
        <input id="botScore" type="number" placeholder="skor (boş=rastgele)" />
        <button id="addBotBtn">Ekle</button>
        <button id="randomBtn">Rastgele</button>
        <span id="seedMsg"></span>
    </div>

    <div class="columns">
        <div>
            <h2>Leaderboard (Eşleşenler) — <span id="lbCount">0</span></h2>
            <table>
                <thead><tr><th>#</th><th>Kullanıcı</th><th>Skor</th><th>Durum</th><th></th></tr></thead>
                <tbody id="lbBody"></tbody>
            </table>
        </div>
        <div>
            <h2>Bekleyen Kuyruk — <span id="wCount">0</span></h2>
            <table>
                <thead><tr><th>Kullanıcı</th><th>Skor</th><th>Bekleme</th></tr></thead>
                <tbody id="wBody"></tbody>
            </table>
        </div>
    </div>

    <h2 style="margin-top:25px">Son Maçlar — <span id="hCount">0</span></h2>
    <table>
        <thead><tr><th>Kazanan</th><th>Kaybeden</th><th>Yeni Skorlar</th><th>Zaman</th></tr></thead>
        <tbody id="hBody"></tbody>
    </table>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        let waitingData = [];

        // --- Kimlik (JWT localStorage'da) ---
        let token = localStorage.getItem('token');
        let username = localStorage.getItem('username');

        function updateAuthUI() {
            const loggedIn = !!token;
            $('authPanel').style.display = loggedIn ? 'none' : 'block';
            $('userPanel').style.display = loggedIn ? 'block' : 'none';
            if (loggedIn) $('who').textContent = username;
        }

        function setAuth(t, u) {
            token = t; username = u;
            localStorage.setItem('token', t);
            localStorage.setItem('username', u);
            updateAuthUI();
        }

        async function auth(path) {
            const res = await fetch('/api/auth/' + path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: $('username').value.trim(), password: $('password').value })
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok) { setAuth(data.token, data.username); $('password').value = ''; }
            else { $('msg').textContent = data.message || 'Hata'; }
        }

        $('loginBtn').addEventListener('click', () => auth('login'));
        $('registerBtn').addEventListener('click', () => auth('register'));

        $('joinBtn').addEventListener('click', async () => {
            const res = await fetch('/api/matchmaking/queue', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 401) { doLogout(); return; }
            $('msg2').textContent = 'Kuyruğa katıldın';
            refresh();
        });

        async function doLogout() {
            if (token) {
                await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(() => { });
            }
            token = null; username = null;
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            updateAuthUI();
            refresh();
        }
        $('logoutBtn').addEventListener('click', doLogout);

        // --- Hızlı ekle (bot) ---
        async function seed(userId, score) {
            const res = await fetch('/api/matchmaking/seed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId || null, score: score })
            });
            const d = await res.json().catch(() => ({}));
            if (res.ok) { $('seedMsg').textContent = d.userId + ' eklendi'; refresh(); }
            else { $('seedMsg').textContent = d.message || 'Hata'; }
        }
        $('addBotBtn').addEventListener('click', () => {
            const id = $('botId').value.trim();
            const s = $('botScore').value ? Number($('botScore').value) : null;
            seed(id, s);
        });
        $('randomBtn').addEventListener('click', () => seed(null, null));

        function renderRows(body, rows, fn) { body.innerHTML = rows.map(fn).join(''); }

        async function deletePlayer(userId) {
            await fetch('/api/matchmaking/player/' + encodeURIComponent(userId), { method: 'DELETE' });
            refresh();
        }

        async function toggleOnline(userId, online) {
            await fetch('/api/matchmaking/player/' + encodeURIComponent(userId) + '/online', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: online })
            });
            refresh();
        }

        async function loadSimulator() {
            try {
                const s = await fetch('/api/matchmaking/simulator').then(r => r.json());
                $('simToggle').checked = s.enabled;
            } catch (e) { }
        }
        $('simToggle').addEventListener('change', async e => {
            await fetch('/api/matchmaking/simulator', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: e.target.checked })
            });
        });

        function renderWaiting() {
            $('wCount').textContent = waitingData.length;
            renderRows($('wBody'), waitingData, r => {
                const wait = r.joinedAtUtc
                    ? Math.floor((Date.now() - new Date(r.joinedAtUtc)) / 1000) + ' sn'
                    : '-';
                return `<tr><td>${r.userId}</td><td>${r.score}</td><td>${wait}</td></tr>`;
            });
        }

        async function refresh() {
            try {
                const [lb, w, h] = await Promise.all([
                    fetch('/api/matchmaking/leaderboard').then(r => r.json()),
                    fetch('/api/matchmaking/waiting').then(r => r.json()),
                    fetch('/api/matchmaking/history').then(r => r.json())
                ]);
                $('lbCount').textContent = lb.length;
                renderRows($('lbBody'), lb,
                    (r, i) => `<tr><td>${i + 1}</td><td>${r.userId}</td><td>${r.score}</td>` +
                        `<td>${r.online ? 'online' : 'offline'}</td>` +
                        `<td><button onclick="toggleOnline('${r.userId}', ${!r.online})">${r.online ? 'Offline yap' : 'Online yap'}</button> ` +
                        `<button onclick="deletePlayer('${r.userId}')">Sil</button></td></tr>`);
                waitingData = w;
                renderWaiting();

                $('hCount').textContent = h.length;
                renderRows($('hBody'), h, m => {
                    const t = new Date(m.completedAtUtc).toLocaleTimeString();
                    return `<tr><td>${m.winnerId}</td><td>${m.loserId}</td><td>${m.winnerScore} / ${m.loserScore}</td><td>${t}</td></tr>`;
                });
            } catch (e) { }
        }

        let refreshTimer = null;
        function scheduleRefresh() {
            if (refreshTimer) return;
            refreshTimer = setTimeout(() => { refreshTimer = null; refresh(); }, 500);
        }

        // --- SignalR ---
        const connection = new signalR.HubConnectionBuilder()
            .withUrl('/hub/matchmaking')
            .withAutomaticReconnect()
            .build();
        connection.on('matchCompleted', scheduleRefresh);
        connection.onreconnected(() => { $('conn').textContent = 'bağlı'; refresh(); });
        connection.onclose(() => { $('conn').textContent = 'bağlantı kapandı'; });
        connection.start()
            .then(() => { $('conn').textContent = 'bağlı'; })
            .catch(() => { $('conn').textContent = 'bağlanamadı'; });

        // --- Başlangıç ---
        updateAuthUI();
        loadSimulator();
        refresh();
        setInterval(renderWaiting, 1000);
        setInterval(refresh, 10000);
    </script>
</body>
</html>
